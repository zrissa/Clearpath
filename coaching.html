<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clearpath — Your Program Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --forest:#0B3D2E;--sage:#1A6B47;--mint:#34C77B;--mint-pale:#E6F9F0;
  --white:#fff;--off:#F8FAF9;--g100:#F2F5F3;--g200:#E2EAE6;--g400:#8BA89A;
  --text:#111C17;--text-md:#3D5248;--text-lt:#6B8A78;
}
html,body{height:100%;font-family:"Plus Jakarta Sans",sans-serif;background:var(--off);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;}

/* NAV */
nav{height:56px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100;}
.nlogo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nmark{width:28px;height:28px;border-radius:7px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--mint);}
.nname{font-size:15px;font-weight:800;color:var(--forest);letter-spacing:-.3px;}
.npill{margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;background:var(--mint-pale);color:var(--sage);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.nsidebar-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text-lt);}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;position:relative;}

/* SIDEBAR */
.sidebar{width:260px;background:var(--white);border-right:1px solid var(--g200);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.profile-card{padding:16px;border-bottom:1px solid var(--g200);}
.pc-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mint);margin-bottom:8px;display:block;}
.pc-name{font-size:15px;font-weight:800;color:var(--forest);margin-bottom:2px;letter-spacing:-.3px;}
.pc-sub{font-size:12px;color:var(--text-lt);margin-bottom:10px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;}
.pc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--g100);color:var(--text-lt);border:1px solid var(--g200);}

.sb-section{padding:12px 16px;border-bottom:1px solid var(--g200);}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);margin-bottom:8px;display:block;}
.qbtn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text-md);cursor:pointer;font-family:"Plus Jakarta Sans",sans-serif;transition:all .15s;margin-bottom:3px;line-height:1.4;}
.qbtn:hover{background:var(--g100);color:var(--forest);}

.pillar-nav{padding:12px 16px;}
.pbtn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-family:"Plus Jakarta Sans",sans-serif;margin-bottom:3px;transition:all .15s;}
.pbtn:hover{background:var(--g100);}
.pbtn.active{background:var(--forest);}
.pbi{font-size:15px;width:20px;text-align:center;}
.pbt{font-size:13px;font-weight:600;color:var(--text-md);}
.pbtn.active .pbt{color:var(--white);}
.pbs{font-size:10px;color:var(--text-lt);display:block;margin-top:1px;}
.pbtn.active .pbs{color:rgba(255,255,255,.5);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-header{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ch-avatar{width:32px;height:32px;border-radius:9px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--mint);flex-shrink:0;}
.ch-name{font-size:14px;font-weight:700;color:var(--forest);}
.ch-sub{font-size:11px;color:var(--text-lt);}
.ch-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-lt);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--mint);}
.sidebar-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px 8px;color:var(--text-lt);font-size:18px;margin-right:4px;}

.thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.thread::-webkit-scrollbar{width:3px;}
.thread::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px;}

/* MESSAGES */
.msg-ai{display:flex;gap:8px;align-items:flex-start;}
.msg-user{display:flex;justify-content:flex-end;}
.mavatar{width:28px;height:28px;border-radius:7px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--mint);flex-shrink:0;margin-top:2px;}
.bai{background:var(--white);border:1px solid var(--g200);border-radius:4px 12px 12px 12px;padding:11px 14px;font-size:14px;line-height:1.65;color:var(--text);max-width:88%;}
.buser{background:var(--forest);border-radius:12px 4px 12px 12px;padding:10px 13px;font-size:14px;line-height:1.65;color:rgba(255,255,255,.9);max-width:78%;}
.bai strong{color:var(--forest);font-weight:700;}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--g400);}

/* INPUT */
.input-area{padding:12px 16px;background:var(--white);border-top:1px solid var(--g200);flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--off);border:1px solid var(--g200);border-radius:10px;padding:2px 4px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(52,199,123,.5);}
textarea{width:100%;background:none;border:none;outline:none;font-size:14px;font-family:"Plus Jakarta Sans",sans-serif;color:var(--text);resize:none;padding:9px 10px;line-height:1.5;max-height:100px;}
textarea::placeholder{color:var(--g400);}
.sbtn{width:38px;height:38px;border-radius:9px;background:var(--forest);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.sbtn:hover{background:var(--sage);}
.sbtn svg{width:15px;height:15px;fill:white;}
.ihint{font-size:11px;color:var(--g400);margin-top:5px;text-align:center;}

@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-4px);}}

/* MOBILE SIDEBAR OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;}
.sidebar-overlay.open{display:block;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{
    position:fixed;left:-260px;top:56px;bottom:0;z-index:200;
    transition:left .25s ease;box-shadow:none;
  }
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.15);}
  .sidebar-toggle{display:flex;}
  .npill{max-width:120px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nlogo">
    <div class="nmark">C</div>
    <span class="nname">Clearpath</span>
  </a>
  <a href="/dashboard" style="font-size:13px;font-weight:600;color:var(--text-lt);text-decoration:none;padding:6px 12px;border-radius:7px;background:var(--g100);margin-left:8px;">← Dashboard</a>
  <span class="npill" id="nav-program">Loading...</span>
</nav>

<div class="app">
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="profile-card">
      <span class="pc-lbl">Your Profile</span>
      <div class="pc-name" id="sb-name">Loading...</div>
      <div class="pc-sub" id="sb-sub"></div>
      <div class="pc-tags" id="sb-tags"></div>
    </div>

    <div class="sb-section">
      <span class="sb-lbl">Quick Questions</span>
      <button class="qbtn" onclick="ask('How do I get a field or gym for my program?')">How do I get a field or gym?</button>
      <button class="qbtn" onclick="ask('What grants should I apply for first?')">What grants should I apply for?</button>
      <button class="qbtn" onclick="ask('What do I need legally to get started?')">What do I need legally?</button>
      <button class="qbtn" onclick="ask('How do I reach families in my community?')">How do I reach families?</button>
      <button class="qbtn" onclick="ask('How should I price my program registration?')">How should I price registration?</button>
      <button class="qbtn" onclick="ask('How do I set up Root for my program?')">How do I set up Root?</button>
    </div>

    <div class="pillar-nav">
      <span class="sb-lbl">Pillars</span>
      <button class="pbtn active" onclick="switchPillar(this,'Build')"><span class="pbi">🏗️</span><div><div class="pbt">Build</div><div class="pbs">Start right</div></div></button>
      <button class="pbtn" onclick="switchPillar(this,'Fund')"><span class="pbi">💰</span><div><div class="pbt">Fund</div><div class="pbs">Find the money</div></div></button>
      <button class="pbtn" onclick="switchPillar(this,'Run')"><span class="pbi">⚙️</span><div><div class="pbt">Run</div><div class="pbs">Powered by Root</div></div></button>
      <button class="pbtn" onclick="switchPillar(this,'Grow')"><span class="pbi">📈</span><div><div class="pbt">Grow</div><div class="pbs">Succeed long term</div></div></button>
    </div>
  </div>

  <div class="main">
    <div class="chat-header">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="ch-avatar">C</div>
      <div>
        <div class="ch-name">Clearpath AI</div>
        <div class="ch-sub" id="ch-context">Your program advisor</div>
      </div>
      <div class="ch-status"><div class="sdot"></div>Active</div>
    </div>

    <div class="thread" id="thread"></div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="user-input" placeholder="Ask anything about your program..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        <button class="sbtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="ihint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
let profile = {};
let messages = [];
let loading = false;
let currentPillar = 'Build';

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}

function loadProfile() {
  const stored = localStorage.getItem('clearpath_profile');
  if (stored) {
    try { profile = JSON.parse(stored); } catch(e) {}
  }
  if (!profile.orgName) {
    profile = { orgName:'Your Program', programType:'Youth Sports', sportOrCategory:'Soccer', city:'your area', state:'', entityType:'Unknown', participantCount:'Unknown', budgetRange:'Unknown', grantExperience:'Unknown', biggestChallenge:'Finding funding', journey:'Unknown' };
  }

  document.getElementById('nav-program').textContent = profile.orgName;
  document.getElementById('sb-name').textContent = profile.orgName;
  document.getElementById('sb-sub').textContent = [profile.programType, profile.sportOrCategory].filter(Boolean).join(' — ') + (profile.city ? ' · ' + profile.city : '');

  const tags = [profile.programType, profile.entityType, profile.budgetRange].filter(t => t && t !== 'Unknown' && t !== 'Not specified');
  document.getElementById('sb-tags').innerHTML = tags.map(t => `<span class="pc-tag">${t}</span>`).join('');
  document.getElementById('ch-context').textContent = `${profile.programType || ''} · ${profile.city || ''} · ${currentPillar} pillar`;

  const onboarded = localStorage.getItem('clearpath_onboarded');
  const sport = profile.sportOrCategory && profile.sportOrCategory !== '' ? ` (${profile.sportOrCategory})` : '';
  let greeting;
  if (onboarded) {
    greeting = `Hi ${profile.firstName || ''}! I know you're running **${profile.orgName}** — a ${profile.programType}${sport} program in ${profile.city || 'your area'}.\n\nYour biggest challenge is **${profile.biggestChallenge}** and you're in the **${currentPillar}** pillar. What would you like to tackle first?`;
  } else {
    greeting = `Hi! I'm your Clearpath advisor. What would you like help with today? You can ask me anything about building, funding, or growing your program.`;
  }
  addMsg('assistant', greeting);
}

function addMsg(role, text) {
  messages.push({ role, content: text });
  renderMsgs();
}

function renderMsgs() {
  const thread = document.getElementById('thread');
  thread.innerHTML = messages.map(m => {
    const fmt = m.content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p style="margin-top:9px;">')
      .replace(/\n/g, '<br/>');
    if (m.role === 'assistant') {
      return `<div class="msg-ai"><div class="mavatar">C</div><div class="bai"><p>${fmt}</p></div></div>`;
    } else {
      return `<div class="msg-user"><div class="buser">${fmt}</div></div>`;
    }
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}

function addTyping() {
  const thread = document.getElementById('thread');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg-ai';
  div.innerHTML = `<div class="mavatar">C</div><div class="bai"><div class="typing"><div class="tdot" style="animation:bounce 1.2s ease-in-out infinite"></div><div class="tdot" style="animation:bounce 1.2s ease-in-out .2s infinite"></div><div class="tdot" style="animation:bounce 1.2s ease-in-out .4s infinite"></div></div></div>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

async function send() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  input.style.height = 'auto';
  loading = true;

  // Close sidebar on mobile after sending
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  addMsg('user', text);
  addTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, orgProfile: profile, pillar: currentPillar })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    addMsg('assistant', data.reply || 'Something went wrong. Please try again.');
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('assistant', 'Having trouble connecting. Please try again.');
  }
  loading = false;
}

function ask(q) {
  document.getElementById('user-input').value = q;
  send();
}

function switchPillar(btn, pillar) {
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPillar = pillar;
  document.getElementById('ch-context').textContent = `${profile.programType || ''} · ${profile.city || ''} · ${pillar} pillar`;

  // Special handling for Run pillar
  if (pillar === 'Run') {
    addMsg('assistant', `The **Run** pillar is powered by **Root** — a purpose-built platform for league management, registration, scheduling, payments, and SafeSport compliance.\n\n**Here's how to get started with Root:**\n1. Go to rootsoccer.com and create a free account\n2. Set up your league or club\n3. Configure your registration forms and pricing\n4. Share your registration link with families\n\nOnce your program is running on Root, come back to the **Grow** pillar and Clearpath will help you turn that data into impact reports and expansion plans.\n\nWant me to walk you through the Root setup for your specific program type?`);
  } else {
    ask(`I want to focus on the ${pillar} pillar. What should I know and do next for ${profile.orgName}?`);
  }
}

// Auth + onboarding gates
if (!localStorage.getItem('clearpath_auth')) { window.location.href = '/signup'; }
else if (!localStorage.getItem('clearpath_onboarded')) { window.location.href = '/onboarding'; }
else { loadProfile(); }
</script>
</body>
</html>
