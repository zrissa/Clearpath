<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clearpath — Your Program Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --forest:#0B3D2E;--sage:#1A6B47;--mint:#34C77B;--mint-pale:#E6F9F0;
  --white:#FFFFFF;--off:#F8FAF9;--g100:#F2F5F3;--g200:#E2EAE6;--g400:#8BA89A;
  --text:#111C17;--text-md:#3D5248;--text-lt:#6B8A78;
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--text);}
body{display:flex;flex-direction:column;}

/* NAV */
nav{height:60px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.nav-mark{width:30px;height:30px;border-radius:8px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--mint);}
.nav-name{font-size:16px;font-weight:800;color:var(--forest);letter-spacing:-.3px;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;background:var(--mint-pale);color:var(--sage);}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:280px;background:var(--white);border-right:1px solid var(--g200);display:flex;flex-direction:column;flex-shrink:0;}
.profile-card{padding:20px;border-bottom:1px solid var(--g200);}
.pc-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mint);margin-bottom:10px;display:block;}
.pc-name{font-size:16px;font-weight:800;color:var(--forest);margin-bottom:3px;letter-spacing:-.3px;}
.pc-sub{font-size:12px;color:var(--text-lt);margin-bottom:12px;}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;}
.pc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--g100);color:var(--text-lt);border:1px solid var(--g200);}

.sidebar-section{padding:16px 20px;border-bottom:1px solid var(--g200);}
.ss-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);margin-bottom:10px;display:block;}
.quick-btn{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text-md);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;margin-bottom:4px;line-height:1.4;}
.quick-btn:hover{background:var(--g100);color:var(--forest);}

.pillar-nav{padding:16px 20px;}
.pillar-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:4px;transition:all .15s;}
.pillar-btn:hover{background:var(--g100);}
.pillar-btn.active{background:var(--forest);}
.pb-icon{font-size:16px;width:20px;text-align:center;}
.pb-text{font-size:13px;font-weight:600;color:var(--text-md);}
.pillar-btn.active .pb-text{color:var(--white);}
.pb-stage{font-size:10px;color:var(--text-lt);display:block;margin-top:1px;}
.pillar-btn.active .pb-stage{color:rgba(255,255,255,.5);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:16px 24px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.ch-avatar{width:36px;height:36px;border-radius:10px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--mint);}
.ch-name{font-size:15px;font-weight:700;color:var(--forest);}
.ch-sub{font-size:12px;color:var(--text-lt);}
.ch-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-lt);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);}

.chat-thread{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.chat-thread::-webkit-scrollbar{width:4px;}
.chat-thread::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px;}

/* MESSAGES */
.msg-ai{display:flex;gap:10px;align-items:flex-start;animation:fadeUp .3s ease both;}
.msg-user{display:flex;justify-content:flex-end;animation:fadeUp .3s ease both;}
.msg-avatar{width:30px;height:30px;border-radius:8px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--mint);flex-shrink:0;margin-top:2px;}
.bubble-ai{background:var(--white);border:1px solid var(--g200);border-radius:4px 14px 14px 14px;padding:13px 16px;font-size:14px;line-height:1.65;color:var(--text);max-width:85%;}
.bubble-user{background:var(--forest);border-radius:14px 4px 14px 14px;padding:11px 15px;font-size:14px;line-height:1.65;color:rgba(255,255,255,.9);max-width:75%;}
.bubble-ai strong{color:var(--forest);font-weight:700;}
.bubble-ai a{color:var(--sage);text-decoration:underline;}

/* TYPING */
.typing-indicator{display:flex;gap:5px;align-items:center;padding:6px 0;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:bounce 1.2s ease-in-out infinite;}
.t-dot:nth-child(2){animation-delay:.2s;}
.t-dot:nth-child(3){animation-delay:.4s;}

/* INPUT */
.input-area{padding:16px 24px;background:var(--white);border-top:1px solid var(--g200);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--off);border:1px solid var(--g200);border-radius:12px;padding:2px 4px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(52,199,123,.5);}
textarea{width:100%;background:none;border:none;outline:none;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);resize:none;padding:10px 12px;line-height:1.5;max-height:120px;}
textarea::placeholder{color:var(--g400);}
.send-btn{width:42px;height:42px;border-radius:10px;background:var(--forest);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.send-btn:hover{background:var(--sage);}
.send-btn svg{width:16px;height:16px;fill:white;}
.input-hint{font-size:11px;color:var(--g400);margin-top:6px;text-align:center;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .chat-header{padding:12px 16px;}
  .chat-thread{padding:16px;}
  .input-area{padding:12px 16px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
    <div class="nav-mark">C</div>
    <span class="nav-name">Clearpath</span>
  </a>
  <div class="nav-right">
    <span class="nav-pill" id="nav-program">Loading...</span>
  </div>
</nav>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="profile-card">
      <span class="pc-label">Your Profile</span>
      <div class="pc-name" id="sb-name">Loading...</div>
      <div class="pc-sub" id="sb-sub"></div>
      <div class="pc-tags" id="sb-tags"></div>
    </div>

    <div class="sidebar-section">
      <span class="ss-label">Quick Questions</span>
      <button class="quick-btn" onclick="ask('How do I get a field or gym for my program?')">How do I get a field or gym?</button>
      <button class="quick-btn" onclick="ask('What grants should I apply for first?')">What grants should I apply for?</button>
      <button class="quick-btn" onclick="ask('What do I need to get started legally?')">What do I need legally?</button>
      <button class="quick-btn" onclick="ask('How do I reach families in my community?')">How do I reach families?</button>
      <button class="quick-btn" onclick="ask('What compliance do I need to be grant-ready?')">What compliance do I need?</button>
      <button class="quick-btn" onclick="ask('How should I price my program registration fees?')">How should I price registration?</button>
    </div>

    <div class="pillar-nav">
      <span class="ss-label">Pillars</span>
      <button class="pillar-btn active" onclick="switchPillar(this,'Build')">
        <span class="pb-icon">🏗️</span>
        <div><div class="pb-text">Build</div><div class="pb-stage">Start right</div></div>
      </button>
      <button class="pillar-btn" onclick="switchPillar(this,'Fund')">
        <span class="pb-icon">💰</span>
        <div><div class="pb-text">Fund</div><div class="pb-stage">Find the money</div></div>
      </button>
      <button class="pillar-btn" onclick="switchPillar(this,'Run')">
        <span class="pb-icon">⚙️</span>
        <div><div class="pb-text">Run</div><div class="pb-stage">Stay on track</div></div>
      </button>
      <button class="pillar-btn" onclick="switchPillar(this,'Grow')">
        <span class="pb-icon">📈</span>
        <div><div class="pb-text">Grow</div><div class="pb-stage">Succeed long term</div></div>
      </button>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div class="main">
    <div class="chat-header">
      <div class="ch-avatar">C</div>
      <div>
        <div class="ch-name">Clearpath AI</div>
        <div class="ch-sub" id="ch-context">Your program advisor</div>
      </div>
      <div class="ch-status">
        <div class="status-dot"></div>
        Active
      </div>
    </div>

    <div class="chat-thread" id="chat-thread"></div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="user-input" placeholder="Ask anything about your program..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

</div>

<script>
let orgProfile = {};
let messages = [];
let isLoading = false;
let currentPillar = 'Build';

function loadProfile() {
  const stored = localStorage.getItem('clearpath_profile');
  if (stored) {
    try { orgProfile = JSON.parse(stored); } catch(e) {}
  }
  if (!orgProfile.orgName) {
    orgProfile = {
      orgName: 'Your Program',
      programType: 'Youth Sports',
      sportOrCategory: 'Soccer',
      location: 'your area',
      participantCount: 'Under 25',
      entityType: 'Not yet incorporated',
      budgetRange: 'Under $25K',
      grantExperience: 'Never applied',
      biggestChallenge: 'Finding funding'
    };
  }

  document.getElementById('nav-program').textContent = orgProfile.orgName;
  document.getElementById('sb-name').textContent = orgProfile.orgName;
  document.getElementById('sb-sub').textContent =
    (orgProfile.programType || '') + (orgProfile.sportOrCategory ? ' — ' + orgProfile.sportOrCategory : '') + ' · ' + (orgProfile.location || '');

  const tags = [
    orgProfile.programType !== 'Not specified' ? orgProfile.programType : null,
    orgProfile.stage !== 'Not specified' ? orgProfile.stage : null,
  ].filter(Boolean);
  document.getElementById('sb-tags').innerHTML = tags.length > 0 ? tags.map(t =>
    `<span class="pc-tag">${t}</span>`).join('') : '<span class="pc-tag" style="color:var(--mint);border-color:rgba(52,199,123,.3);background:var(--mint-pale);">Complete your profile →</span>';

  document.getElementById('ch-context').textContent =
    `${orgProfile.programType} · ${orgProfile.location} · ${currentPillar} pillar`;

  const greeting = `Hi ${orgProfile.firstName || ''}! I'm your Clearpath advisor — I know you're building **${orgProfile.orgName}**, a ${orgProfile.programType !== 'Not specified' ? orgProfile.programType : 'community'} program${orgProfile.location !== 'Not specified' ? ' in ' + orgProfile.location : ''}.\n\nTo give you the most specific advice, I have a few quick questions. What sport or program category are you running, and where are you in the journey — just starting, already running, or ready to grow?\n\nOr just ask me anything and I'll help you figure out your next step.`;

  addMessage('assistant', greeting);
}

function addMessage(role, text) {
  messages.push({ role, content: text });
  renderMessages();
}

function renderMessages() {
  const thread = document.getElementById('chat-thread');
  thread.innerHTML = messages.map(m => {
    const formatted = m.content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p style="margin-top:10px;">')
      .replace(/\n/g, '<br/>');

    if (m.role === 'assistant') {
      return `<div class="msg-ai">
        <div class="msg-avatar">C</div>
        <div class="bubble-ai"><p>${formatted}</p></div>
      </div>`;
    } else {
      return `<div class="msg-user">
        <div class="bubble-user">${formatted}</div>
      </div>`;
    }
  }).join('');
  thread.scrollTop = thread.scrollHeight;
}

function addTyping() {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'msg-ai';
  div.innerHTML = `<div class="msg-avatar">C</div>
    <div class="bubble-ai">
      <div class="typing-indicator">
        <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
      </div>
    </div>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;

  addMessage('user', text);
  addTyping();

  const apiMessages = messages.map(m => ({
    role: m.role,
    content: m.content
  }));

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        orgProfile,
        pillar: currentPillar
      })
    });

    const data = await res.json();
    document.getElementById('typing')?.remove();

    if (data.reply) {
      addMessage('assistant', data.reply);
    } else {
      addMessage('assistant', "Something went wrong. Please try again.");
    }
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMessage('assistant', "I'm having trouble connecting right now. Please try again in a moment.");
  }

  isLoading = false;
}

function ask(question) {
  document.getElementById('user-input').value = question;
  sendMessage();
}

function switchPillar(btn, pillar) {
  document.querySelectorAll('.pillar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPillar = pillar;
  document.getElementById('ch-context').textContent =
    `${orgProfile.programType} · ${orgProfile.location} · ${pillar} pillar`;
  ask(`I want to focus on the ${pillar} pillar. What should I know and do next for ${orgProfile.orgName}?`);
}

loadProfile();

// Auth gate
if (!localStorage.getItem('clearpath_auth')) {
  window.location.href = '/signup';
}

// Onboarding gate
if (!localStorage.getItem('clearpath_onboarded')) {
  window.location.href = '/onboarding';
}
</script>
</body>
</html>
